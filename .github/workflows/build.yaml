name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IS_STABLE: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android Signing
        if: startsWith(matrix.platform, 'android') && secrets.KEYSTORE != ''
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Google Services
        if: startsWith(matrix.platform, 'android') && secrets.SERVICE_JSON != ''
        run: |
          echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Verify R8 minification
        if: startsWith(matrix.platform, 'android')
        run: |
          for DIR in \
            build/app/outputs/mapping/release \
            build/app/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out; do
            if [ -d "$DIR" ]; then
              echo "Found build output: $DIR"
            fi
          done

          MAPPING="build/app/outputs/mapping/release/mapping.txt"
          if [ -f "$MAPPING" ]; then
            echo "::group::R8 Minification Report"
            echo "mapping.txt: $(wc -l < "$MAPPING") entries"
            SEEDS="build/app/outputs/mapping/release/seeds.txt"
            if [ -f "$SEEDS" ]; then
              echo "seeds.txt: $(wc -l < "$SEEDS") entries"
            fi
            USAGE="build/app/outputs/mapping/release/usage.txt"
            if [ -f "$USAGE" ]; then
              echo "usage.txt: $(wc -l < "$USAGE") entries"
            fi
            echo "::endgroup::"
          else
            echo "::error::R8 mapping.txt not found — minification did not run"
            exit 1
          fi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

      - name: Upload R8 mapping
        if: startsWith(matrix.platform, 'android')
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping-${{ matrix.platform }}
          path: build/app/outputs/mapping/release/
          retention-days: 90
          if-no-files-found: warn

  release:
    needs: [ build ]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        working-directory: ./dist
        run: |
          shopt -s nullglob
          for file in *; do
            [ -f "$file" ] && sha256sum "$file" > "${file}.sha256"
          done

      - name: Generate changelog
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            tags=($(git tag --merged HEAD --sort=-creatordate))
            preTag=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
              sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
            [ -z "$preTag" ] && preTag=""

            > release.md
            for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$preTag" ]] && break
              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"
              git log --no-merges --pretty=format:"%B" "$range" | \
                awk '!/Update changelog/ && NF {print "- " $0}' >> release.md
            done
          else
            cat > release.md <<EOF
          ## Build #${{ github.run_number }}

          **Commit:** \`${GITHUB_SHA:0:7}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Triggered by:** @${{ github.actor }}

          ### Changes
          $(git log --no-merges -5 --pretty=format:"- %s (%h)")
          EOF
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body_path: ./release.md
          files: ./dist/*
          prerelease: ${{ env.IS_STABLE != 'true' }}
          make_latest: ${{ env.IS_STABLE == 'true' }}
