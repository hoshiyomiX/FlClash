name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IS_STABLE: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: startsWith(matrix.platform,'android') && env.KEYSTORE != ''
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Google Services
        if: startsWith(matrix.platform,'android') && env.SERVICE_JSON != ''
        env:
          SERVICE_JSON: ${{ secrets.SERVICE_JSON }}
        run: |
          echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Verify R8 minification
        if: startsWith(matrix.platform,'android')
        run: |
          MAPPING_DIR="build/app/outputs/mapping/release"
          if [ -f "$MAPPING_DIR/mapping.txt" ]; then
            echo "✅ R8 mapping.txt found — minification was applied"
            LINES=$(wc -l < "$MAPPING_DIR/mapping.txt")
            echo "   mapping.txt entries: $LINES"
            SEEDS=$(wc -l < "$MAPPING_DIR/seeds.txt" 2>/dev/null || echo 0)
            echo "   seeds.txt entries: $SEEDS"
          else
            echo "❌ R8 mapping.txt NOT found — minification may not have run"
            exit 1
          fi
          APK_DIR="build/app/outputs/flutter-apk"
          if ls $APK_DIR/*.apk 1>/dev/null 2>&1; then
            echo "✅ APK artifacts found:"
            ls -lh $APK_DIR/*.apk
          else
            echo "⚠️  No APKs in flutter-apk, checking apk output..."
            find build/app/outputs -name "*.apk" -exec ls -lh {} \;
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

      - name: Upload R8 mapping
        if: startsWith(matrix.platform,'android')
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping-${{ matrix.platform }}
          path: build/app/outputs/mapping/release/
          retention-days: 90
          if-no-files-found: warn

  release:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Set release tag
        id: release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            TAG="build-${{ github.run_number }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Generate release.md
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            tags=($(git tag --merged HEAD --sort=-creatordate))
            preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
            [ -z "$preTag" ] && preTag=""
            out="release.md" > "$out"
            for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$preTag" ]] && break
              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"
              git log --no-merges --pretty=format:"%B" "$range" | \
              awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
            done
          else
            echo "## Build #${{ github.run_number }}" > release.md
            echo "" >> release.md
            echo "**Commit:** \`${GITHUB_SHA:0:7}\`" >> release.md
            echo "**Branch:** \`${{ github.ref_name }}\`" >> release.md
            echo "**Triggered by:** ${{ github.actor }}" >> release.md
            echo "" >> release.md
            echo "### Changes" >> release.md
            echo "" >> release.md
            git log --no-merges -5 --pretty=format:"- %s (%h)" >> release.md
          fi

      - name: Generate sha256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_STABLE != 'true' }}
          make_latest: ${{ env.IS_STABLE == 'true' }}
